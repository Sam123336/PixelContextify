services:
  postgres:
    image: postgres:16-alpine
    container_name: contextifly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: contextifly
      POSTGRES_PASSWORD: contextifly
      POSTGRES_DB: contextifly
    ports:
      - "5432:5432"
    volumes:
      - contextifly_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contextifly -d contextifly"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: contextifly-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - contextifly_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  contextifly_pgdata:
  contextifly_redisdata:
