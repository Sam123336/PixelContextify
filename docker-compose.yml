services:
  postgres:
    image: postgres:16-alpine
    container_name: contextify-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: contextify
      POSTGRES_PASSWORD: contextify
      POSTGRES_DB: contextify
    ports:
      - "5432:5432"
    volumes:
      - contextify_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contextify -d contextify"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: contextify-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - contextify_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  contextify_pgdata:
  contextify_redisdata:
